<!doctype html>
<html>
  <head>
    <title>Statement Page</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="../styles/style.css" />
  </head>
  <body class="container mt-4">
    <h3>Statement Page</h3>

    <form id="txnForm" class="row g-2 mb-3">
      <div class="col-md-2">
        <input id="txnDate" type="date" class="form-control" required />
      </div>

      <div class="col-md-3">
        <input
          id="header"
          type="text"
          class="form-control"
          placeholder="Header"
          required
        />
      </div>

      <div class="col-md-2">
        <input
          id="credit"
          type="number"
          class="form-control"
          placeholder="Credit"
          min="0"
        />
      </div>

      <div class="col-md-2">
        <input
          id="debit"
          type="number"
          class="form-control"
          placeholder="Debit"
          min="0"
        />
      </div>

      <div class="col-md-3">
        <button type="submit" class="btn btn-primary w-100">ADD</button>
      </div>
    </form>

    <table class="table table-bordered">
      <thead class="table-light">
        <tr>
          <th>Date</th>
          <th>Header</th>
          <th>Credit</th>
          <th>Debit</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="txnBody"></tbody>

      <tfoot class="table-light">
        <tr>
          <th colspan="2" class="text-end">Total</th>
          <th class="text" id="totalCredit">0</th>
          <th class="text" id="totalDebit">0</th>
          <th></th>
        </tr>
        <tr>
          <th colspan="2" class="text-end">Balance</th>
          <th colspan="3" class="text-end" id="balance">0</th>
        </tr>
      </tfoot>
    </table>

    <script type="module" src="../../dist/lib/script.js"></script>
  </body>
</html>
